<!DOCTYPE html>
<html lang="en">

<head>
  <!-- meta tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="shortcut icon" href="./assets/images/logo.png" type="image/png">
  <!-- fonts -->
  <link rel="stylesheet" href="./assets/fonts/fonts.css">
  <!-- style -->
  <link rel="stylesheet" href="./index-2.css">
  <!-- libraries -->
  <script src="./assets/libraries/vue.min.js"></script>
  <script src="./assets/libraries/jszip.min.js"></script>
  <script src="./assets/libraries/prism.min.js"></script>
  <!-- script -->
  <script src="./index-2.js" type="module" defer></script>
  <!-- page title -->
  <title>Glyphs</title>
</head>

<body>
  <!-- app root -->
  <div id="app">
    <!-- header -->
    <header>
      <div class="logo"></div>
      <input
        type="text"
        id="search"
        placeholder="Search Glyphs..."
        v-model="query.text"
        @input="search"
        spellcheck="false"
      />
    </header>
    <!-- content -->
    <div class="content">
      <!-- listing -->
      <div class="listing">
        <div class="listing-inner">
          <div
            class="listing-item"
            :data-selected="query.group === item"
            @click="group(item)"
            v-if="items?.[item]?.length > 0"
            v-for="item in groups">
            <div class="listing-item-name">
              {{item}}
            </div>
            <div class="listing-item-count">
              {{items?.[item]?.length}}
            </div>
          </div>
        </div>
      </div>
      <!-- results -->
      <div class="results">
        <div
          class="results-item"
          v-for="item in results"
          @click="open(item)"
          :data-loading="!item.icon">
          <div
            class="results-item-icon"
            v-html="item.icon?.domElement.outerHTML">
          </div>
          <div
            class="results-item-text">
            {{item.id}}
          </div>
        </div>
      </div>
    </div>
    <!-- popup -->
    <div class="popup" :data-opened="popup.toString()">
      <div class="popup-content">
        <div class="popup-content-inner">
          <!-- preview -->
          <div class="icon-preview">
            <div class="icon-preview-content" :data-inverted="inverted" ref="icon"></div>
            <div class="icon-preview-footer">
              <button class="icon-preview-default" @click="inverted = false"></button>
              <button class="icon-preview-inverted" @click="inverted = true"></button>
            </div>
          </div>
          <!-- options -->
          <fieldset class="options" @input="update">
            <!-- rotate -->
            <label for="rotate">
              <div class="label-text">
                Rotate
              </div>
              <input type="range" id="rotate" min="0" max="360" v-model="style.rotate">
              <input type="number" id="rotate" min="0" max="360" v-model="style.rotate">
            </label>
            <!-- opacity -->
            <label for="opacity">
              <div class="label-text">
                Opacity
              </div>
              <input type="range" id="opacity" min="0" max="1" step="0.01" v-model="style.opacity">
              <input type="number" id="opacity" min="0" max="1" step="0.01" v-model="style.opacity">
            </label>
            <!-- scale -->
            <label for="scale">
              <div class="label-text">
                Scale
              </div>
              <input type="range" id="scale" min="0.1" max="2" step="0.1" v-model="style.scale">
              <input type="number" id="scale" min="0.1" max="2" step="0.1" v-model="style.scale">
            </label>
            <!-- close button -->
            <button @click="popup = false">
              Close
            </button>
          </fieldset>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
